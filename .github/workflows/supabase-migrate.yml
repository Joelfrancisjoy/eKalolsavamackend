name: Supabase Migrate

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev default-libmysqlclient-dev libssl-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # ensure PostgreSQL adapter is present; some platforms need system libs
          pip install psycopg-binary
          pip install -r requirements.txt

      - name: Verify psycopg installation
        run: |
          echo "PIP LIST:"
          pip list
          echo "SHOW PACKAGE INFO:"
          pip show psycopg-binary || pip show psycopg2-binary || true
          echo "PYTHON IMPORT TESTS:"
          python - <<'PY'
import sys
print('Python', sys.version)
try:
    import psycopg
    print('Imported psycopg', getattr(psycopg, '__version__', 'unknown'))
except Exception as e:
    print('psycopg import failed:', type(e).__name__, e)
try:
    import psycopg2
    print('Imported psycopg2', getattr(psycopg2, '__version__', 'unknown'))
except Exception as e:
    print('psycopg2 import failed:', type(e).__name__, e)
PY

      - name: Prepare for migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
        run: |
          # reinstall adapter just in case
          python -m pip install psycopg-binary
          echo "=== final import check ==="
          python - <<'PY'
import sys
print('sys.path', sys.path)
try:
    import psycopg
    print('psycopg imported', psycopg.__version__)
except Exception as e:
    print('failed psycopg import:', e)
try:
    import psycopg2
    print('psycopg2 imported', psycopg2.__version__)
except Exception as e:
    print('failed psycopg2 import:', e)
PY
          python manage.py migrate --noinput
          # collectstatic is optional; allow it to fail harmlessly if staticfiles not configured
          python manage.py collectstatic --noinput || true
