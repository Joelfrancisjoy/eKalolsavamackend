name: Supabase Migrate

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpq-dev default-libmysqlclient-dev libssl-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # ensure PostgreSQL adapter is present; some platforms need system libs
          pip install psycopg-binary
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
        run: |
          python manage.py migrate --noinput
          # collectstatic is optional; allow it to fail harmlessly if staticfiles not configured
          python manage.py collectstatic --noinput || true
